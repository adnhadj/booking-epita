name: pull-request-security

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: read

jobs:
  dependencies:
    name: dependencies
    runs-on: ubuntu-latest

    steps:
      - name: checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: run osv-scanner after PR
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --format json
            --output osv-after.json
            ./
        continue-on-error: true

      - name: checkout baseline commit
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}

      - name: run osv-scanner before PR
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --format json
            --output osv-before.json
            ./
        continue-on-error: true

      - name: upload OSV reports
        uses: actions/upload-artifact@v4
        with:
          name: dependencies-reports
          path: |
            osv-before.json
            osv-after.json

  source-code-analysis:
    name: source-code-analysis
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep@sha256:7810f1d7884974ab6dda7bef8f4a2c8e165ea2142fd8260515d380e4f1407263

    steps:
      - name: checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: run semgrep differential analysis
        run: |
          semgrep \
            --config .semgrep \
            --baseline-commit ${{ github.event.pull_request.base.sha }} \
            --sarif \
            --output SourceCodeAnalysisPR.sarif \
            .
        continue-on-error: true

      - name: upload semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: SourceCodeAnalysisPR.sarif

      - name: upload semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: source-code-analysis-pr-report
          path: SourceCodeAnalysisPR.sarif
